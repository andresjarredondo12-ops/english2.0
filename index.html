<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master A1-C2</title>

<meta name="theme-color" content="#4facfe">

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
}

.container{
    padding:15px;
    max-width:700px;
    margin:auto;
}

h1{ margin-top:10px; }

button{
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

button:hover{ background:#ffd700; }

.hidden{ display:none; }

.card{
    background:white;
    color:#333;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}

input{
    padding:8px;
    width:90%;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

.progressBar{
    width:100%;
    height:18px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}

.progressFill{
    height:100%;
    background:#4caf50;
    width:0%;
    transition:0.3s;
}

.level{
    font-size:20px;
    font-weight:bold;
}

.result{
    font-weight:bold;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="container">

<h1>🎓 English Master A1 → C2</h1>

<div id="home">
    <button onclick="selectMode('kids')">👶 Niños</button>
    <button onclick="selectMode('adult')">👨‍💼 Adultos</button>
</div>

<div id="kids" class="hidden">
    <div id="kidsContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

<div id="adult" class="hidden">
    <div id="adultContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

</div>

<script>

/* =========================
CONFIGURACIÓN
========================= */

const levels = ["A1","A2","B1","B2","C1","C2"];
const PASS_PERCENT = 80;

let progress = JSON.parse(localStorage.getItem("progress")) || {
    kidsIndex:0,
    adultIndex:0
};

let correctAnswers = 0;
let totalQuestions = 0;
let currentMode="";

function saveProgress(){
    localStorage.setItem("progress", JSON.stringify(progress));
}

/* =========================
VOZ
========================= */

function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speech.rate=0.9;
    speechSynthesis.speak(speech);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function listenAndCheck(correctAnswer, resultID){
    if(!SpeechRecognition){
        alert("Usa Chrome para reconocimiento de voz");
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang="en-US";
    recognition.start();

    recognition.onresult = function(event){
        let userSpeech = event.results[0][0].transcript.toLowerCase().trim();
        checkAnswer(userSpeech, correctAnswer, resultID);
    };
}

/* =========================
VERIFICACIÓN
========================= */

function checkAnswer(userAnswer, correctAnswer, resultID){
    let result = document.getElementById(resultID);

    if(userAnswer.toLowerCase().trim() === correctAnswer.toLowerCase().trim()){
        result.innerHTML="✅ Correcto";
        result.style.color="green";
        correctAnswers++;
    }else{
        result.innerHTML="❌ Incorrecto<br>✔ Respuesta correcta: "+correctAnswer;
        result.style.color="red";
    }

    updateProgressBar();
}

function updateProgressBar(){
    let percent = (correctAnswers/totalQuestions)*100;
    document.querySelector(".progressFill").style.width = percent+"%";
}

/* =========================
NAVEGACIÓN
========================= */

function selectMode(mode){
    currentMode=mode;
    correctAnswers=0;

    document.getElementById("home").classList.add("hidden");
    document.getElementById(mode).classList.remove("hidden");

    if(mode==="kids") loadKids();
    else loadAdult();
}

function goHome(){
    document.getElementById("kids").classList.add("hidden");
    document.getElementById("adult").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

/* =========================
CONTENIDO
========================= */

const kidsContent = {
A1:["Red","Dog","Cat","Hello","Bye"],
A2:["I am happy","This is my book","I like apples","Good morning","Thank you"],
B1:["I go to school","My best friend is kind","I play soccer","Today is sunny","I love my family"],
B2:["I help my parents","We went to the park","I finished my homework","My teacher is friendly","I enjoy reading books"],
C1:["I want to be a doctor","Education is important","Practice makes perfect","Learning is fun","We must respect others"],
C2:["Communication is important","We should protect nature","Knowledge gives power","Teamwork builds success","Dream big and work hard"]
};

const adultContent = {
A1:["Hello, how are you?","I am fine","Nice to meet you","Where is the bathroom?","I need help"],
A2:["I work every day","I like learning English","Can you help me?","How much does this cost?","I live in this city"],
B1:["I am looking for a job","I have experience in sales","Could you repeat that?","I need more information","What do you recommend?"],
B2:["I have been working here for five years","We achieved our goals","This project is challenging","I solved the problem","Let's schedule a meeting"],
C1:["I would like to improve my professional skills","The market has changed significantly","Leadership requires responsibility","We need a long term strategy","Customer satisfaction is essential"],
C2:["Globalization has transformed international markets","Innovation drives economic growth","Strategic planning determines success","Sustainable development is necessary","Effective communication is crucial in leadership"]
};

/* =========================
CARGA CONTENIDO
========================= */

function loadKids(){
    loadContent("kidsContent","kidsIndex","kids");
}

function loadAdult(){
    loadContent("adultContent","adultIndex","adult");
}

function loadContent(contentVar,indexVar,mode){

    if(progress[indexVar]>=levels.length){
        document.getElementById(mode+"Content").innerHTML="<h2>🏆 Completaste C2</h2>";
        return;
    }

    let levelName = levels[progress[indexVar]];
    let lessons = eval(contentVar)[levelName];

    totalQuestions = lessons.length*2;
    correctAnswers = 0;

    let html = `<p class="level">Nivel ${levelName}</p>`;
    html += progressBar(0);

    lessons.forEach((text,i)=>{

        html+=`
        <div class="card">
            <h4>${text}</h4>
            <button onclick="speak('${text}')">🔊 Escuchar</button>
            <button onclick="listenAndCheck('${text}','v${i}')">🎤 Pronunciar</button>
            <p id="v${i}" class="result"></p>

            <input type="text" id="w${i}" placeholder="Escribe aquí...">
            <button onclick="checkAnswer(document.getElementById('w${i}').value,'${text}','t${i}')">✍ Verificar Escritura</button>
            <p id="t${i}" class="result"></p>
        </div>
        `;
    });

    html+=`<button onclick="evaluateLevel()">📊 Evaluar Nivel</button>`;
    document.getElementById(mode+"Content").innerHTML=html;
}

/* =========================
EVALUACIÓN
========================= */

function evaluateLevel(){
    let percent = (correctAnswers/totalQuestions)*100;

    if(percent>=PASS_PERCENT){
        alert("✅ Aprobado con "+percent.toFixed(0)+"%");
        if(currentMode==="kids") progress.kidsIndex++;
        else progress.adultIndex++;
        saveProgress();
        selectMode(currentMode);
    }else{
        alert("❌ Necesitas mínimo 80%. Obtuviste "+percent.toFixed(0)+"%");
        selectMode(currentMode);
    }
}

/* =========================
BARRA PROGRESO
========================= */

function progressBar(percent){
    return `
    <div class="progressBar">
        <div class="progressFill" style="width:${percent}%"></div>
    </div>
    `;
}

</script>

</body>
</html>
