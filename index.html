<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master Ultimate A1-C2</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
}

.container{ padding:20px; }

button{
    padding:12px;
    margin:6px;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

button:hover{ background:#ffd700; }

.hidden{ display:none; }

.card{
    background:white;
    color:#333;
    padding:15px;
    border-radius:15px;
    margin:10px;
}

.progressBar{
    width:80%;
    height:20px;
    background:#ddd;
    margin:10px auto;
    border-radius:10px;
    overflow:hidden;
}

.progressFill{
    height:100%;
    background:#4caf50;
    width:0%;
}

.level{
    font-size:18px;
    font-weight:bold;
}

.badge{
    background:gold;
    padding:5px 10px;
    border-radius:10px;
    color:black;
}
</style>
</head>
<body>

<div class="container">

<h1>🎓 English Master A1 → C2</h1>

<div id="home">
    <button onclick="selectMode('kids')">👶 Niños</button>
    <button onclick="selectMode('adult')">👨‍💼 Adultos</button>
</div>

<div id="kids" class="hidden">
    <h2>Modo Niños</h2>
    <div id="kidsContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

<div id="adult" class="hidden">
    <h2>Modo Adultos</h2>
    <div id="adultContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

</div>

<script>

/////////////////////////////////////////////////
// CONFIGURACIÓN GLOBAL
/////////////////////////////////////////////////

const levels = ["A1","A2","B1","B2","C1","C2"];

let progress = JSON.parse(localStorage.getItem("progress")) || {
    kidsIndex:0,
    adultIndex:0,
    kidsScore:0,
    adultScore:0
};

function saveProgress(){
    localStorage.setItem("progress", JSON.stringify(progress));
}

/////////////////////////////////////////////////
// VOZ
/////////////////////////////////////////////////

function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speechSynthesis.speak(speech);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function listenAndCheck(correctAnswer, resultID){
    if(!SpeechRecognition){
        alert("Usa Google Chrome para reconocimiento de voz");
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang="en-US";
    recognition.start();

    recognition.onresult = function(event){
        let userSpeech = event.results[0][0].transcript.toLowerCase();
        let correct = correctAnswer.toLowerCase();

        let result = document.getElementById(resultID);
        result.innerHTML = "Dijiste: " + userSpeech;

        if(userSpeech.includes(correct)){
            result.innerHTML += " ✅ Correcto!";
            increaseScore();
        }else{
            result.innerHTML += " ❌ Incorrecto";
        }
    };
}

/////////////////////////////////////////////////
// NAVEGACIÓN
/////////////////////////////////////////////////

let currentMode="";

function selectMode(mode){
    currentMode=mode;
    document.getElementById("home").classList.add("hidden");
    document.getElementById(mode).classList.remove("hidden");

    if(mode==="kids") loadKids();
    else loadAdult();
}

function goHome(){
    document.getElementById("kids").classList.add("hidden");
    document.getElementById("adult").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

function increaseScore(){
    if(currentMode==="kids") progress.kidsScore++;
    else progress.adultScore++;
    saveProgress();
}

/////////////////////////////////////////////////
// CONTENIDO NIÑOS A1 → C2
/////////////////////////////////////////////////

const kidsContent = {
A1:[{w:"Red"},{w:"Dog"}],
A2:[{w:"Blue"},{w:"Cat"}],
B1:[{w:"Apple"},{w:"School"}],
B2:[{w:"Because"},{w:"Friendship"}],
C1:[{w:"Environment"},{w:"Opportunity"}],
C2:[{w:"Responsibility"},{w:"Knowledge"}]
};

function loadKids(){

    if(progress.kidsIndex>=levels.length){
        document.getElementById("kidsContent").innerHTML="<h3>🏆 ¡Completaste hasta C2!</h3>";
        return;
    }

    let levelName = levels[progress.kidsIndex];
    let lessons = kidsContent[levelName];

    let html = `<p class="level">Nivel ${levelName}</p>`;
    html += progressBar(progress.kidsScore, lessons.length);

    lessons.forEach((item,i)=>{
        html+=`
        <div class="card">
            <h3>${item.w}</h3>
            <button onclick="speak('${item.w}')">🔊 Escuchar</button>
            <button onclick="listenAndCheck('${item.w}','k${i}')">🎤 Pronunciar</button>
            <p id="k${i}"></p>
        </div>
        `;
    });

    if(progress.kidsScore>=lessons.length){
        html+=`<button onclick="nextKids()">🚀 Siguiente Nivel</button>`;
    }

    document.getElementById("kidsContent").innerHTML=html;
}

function nextKids(){
    progress.kidsIndex++;
    progress.kidsScore=0;
    saveProgress();
    loadKids();
}

/////////////////////////////////////////////////
// CONTENIDO ADULTOS A1 → C2
/////////////////////////////////////////////////

const adultContent = {
A1:[{q:"Say: Hello",a:"hello"}],
A2:[{q:"Say: I work every day",a:"i work every day"}],
B1:[{q:"Say: I am learning English",a:"i am learning english"}],
B2:[{q:"Say: I have experience in management",a:"i have experience in management"}],
C1:[{q:"Say: I would like to improve my professional skills",a:"i would like to improve my professional skills"}],
C2:[{q:"Say: Globalization has transformed international markets",a:"globalization has transformed international markets"}]
};

function loadAdult(){

    if(progress.adultIndex>=levels.length){
        document.getElementById("adultContent").innerHTML="<h3>🏆 ¡Nivel C2 completado!</h3>";
        return;
    }

    let levelName = levels[progress.adultIndex];
    let lessons = adultContent[levelName];

    let html = `<p class="level">Nivel ${levelName}</p>`;
    html += progressBar(progress.adultScore, lessons.length);

    lessons.forEach((item,i)=>{
        html+=`
        <div class="card">
            <p>${item.q}</p>
            <button onclick="speak('${item.a}')">🔊 Escuchar ejemplo</button>
            <button onclick="listenAndCheck('${item.a}','a${i}')">🎤 Responder</button>
            <p id="a${i}"></p>
        </div>
        `;
    });

    if(progress.adultScore>=lessons.length){
        html+=`<button onclick="nextAdult()">🚀 Siguiente Nivel</button>`;
    }

    document.getElementById("adultContent").innerHTML=html;
}

function nextAdult(){
    progress.adultIndex++;
    progress.adultScore=0;
    saveProgress();
    loadAdult();
}

/////////////////////////////////////////////////
// BARRA PROGRESO
/////////////////////////////////////////////////

function progressBar(score,total){
    let percent = (score/total)*100;
    return `
    <div class="progressBar">
        <div class="progressFill" style="width:${percent}%"></div>
    </div>
    `;
}

</script>

</body>
</html>
