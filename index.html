<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master Pro A1-C2</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
}

.container{ padding:20px; }

button{
    padding:10px;
    margin:6px;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

button:hover{ background:#ffd700; }

.hidden{ display:none; }

.card{
    background:white;
    color:#333;
    padding:15px;
    border-radius:15px;
    margin:10px;
}

.progressBar{
    width:80%;
    height:20px;
    background:#ddd;
    margin:10px auto;
    border-radius:10px;
    overflow:hidden;
}

.progressFill{
    height:100%;
    background:#4caf50;
    width:0%;
}

.level{
    font-size:18px;
    font-weight:bold;
}

.result{
    font-weight:bold;
    margin-top:5px;
}
</style>
</head>
<body>

<div class="container">

<h1>🎓 English Master A1 → C2</h1>

<div id="home">
    <button onclick="selectMode('kids')">👶 Niños</button>
    <button onclick="selectMode('adult')">👨‍💼 Adultos</button>
</div>

<div id="kids" class="hidden">
    <h2>Modo Niños</h2>
    <div id="kidsContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

<div id="adult" class="hidden">
    <h2>Modo Adultos</h2>
    <div id="adultContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

</div>

<script>

const levels = ["A1","A2","B1","B2","C1","C2"];
const PASS_PERCENT = 80;

let progress = JSON.parse(localStorage.getItem("progress")) || {
    kidsIndex:0,
    adultIndex:0
};

let correctAnswers = 0;
let totalQuestions = 0;
let currentMode="";

function saveProgress(){
    localStorage.setItem("progress", JSON.stringify(progress));
}

function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speechSynthesis.speak(speech);
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

function listenAndCheck(correctAnswer, resultID){
    if(!SpeechRecognition){
        alert("Usa Google Chrome");
        return;
    }

    let recognition = new SpeechRecognition();
    recognition.lang="en-US";
    recognition.start();

    recognition.onresult = function(event){
        let userSpeech = event.results[0][0].transcript.toLowerCase().trim();
        let correct = correctAnswer.toLowerCase().trim();
        let result = document.getElementById(resultID);

        if(userSpeech.includes(correct)){
            result.innerHTML="✅ Correcto";
            result.style.color="green";
            correctAnswers++;
        }else{
            result.innerHTML="❌ Incorrecto";
            result.style.color="red";
        }
    };
}

function selectMode(mode){
    currentMode=mode;
    correctAnswers=0;

    document.getElementById("home").classList.add("hidden");
    document.getElementById(mode).classList.remove("hidden");

    if(mode==="kids") loadKids();
    else loadAdult();
}

function goHome(){
    document.getElementById("kids").classList.add("hidden");
    document.getElementById("adult").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

//////////////////////////////////////////////////
// CONTENIDO COMPLETO A1 → C2
//////////////////////////////////////////////////

const kidsContent = {
A1:["Red","Dog","Blue","Cat","One"],
A2:["Apple","School","Water","Book","Happy"],
B1:["Because","Family","Friend","Teacher","Playground"],
B2:["Environment","Important","Different","Country","Beautiful"],
C1:["Opportunity","Responsibility","Experience","Knowledge","Education"],
C2:["Communication","Development","Achievement","Independence","Understanding"]
};

const adultContent = {
A1:["hello","my name is John","I work","good morning","thank you"],
A2:["I work every day","I like learning","I have two years experience","This is important","We are ready"],
B1:["I am learning English","I have worked in sales","I can manage a team","This project is complex","I need more information"],
B2:["I have experience in management","We achieved our goals","This strategy is effective","The company is growing","I solved the problem"],
C1:["I would like to improve my professional skills","The market has changed significantly","We need a long term strategy","Leadership requires responsibility","Global competition is increasing"],
C2:["Globalization has transformed international markets","Sustainable development is essential for future generations","Innovation drives economic growth","Effective communication is crucial in leadership","Strategic planning determines long term success"]
};

//////////////////////////////////////////////////
// CARGA NIÑOS
//////////////////////////////////////////////////

function loadKids(){

    if(progress.kidsIndex>=levels.length){
        document.getElementById("kidsContent").innerHTML="<h3>🏆 Completaste C2</h3>";
        return;
    }

    let levelName = levels[progress.kidsIndex];
    let lessons = kidsContent[levelName];

    totalQuestions = lessons.length;
    correctAnswers = 0;

    let html = `<p class="level">Nivel ${levelName}</p>`;
    html += progressBar(0);

    lessons.forEach((word,i)=>{
        html+=`
        <div class="card">
            <h3>${word}</h3>
            <button onclick="speak('${word}')">🔊 Escuchar</button>
            <button onclick="listenAndCheck('${word}','k${i}')">🎤 Pronunciar</button>
            <p id="k${i}" class="result"></p>
        </div>
        `;
    });

    html+=`<button onclick="evaluateLevel()">📊 Evaluar Nivel</button>`;
    document.getElementById("kidsContent").innerHTML=html;
}

//////////////////////////////////////////////////
// CARGA ADULTOS
//////////////////////////////////////////////////

function loadAdult(){

    if(progress.adultIndex>=levels.length){
        document.getElementById("adultContent").innerHTML="<h3>🏆 Completaste C2</h3>";
        return;
    }

    let levelName = levels[progress.adultIndex];
    let lessons = adultContent[levelName];

    totalQuestions = lessons.length;
    correctAnswers = 0;

    let html = `<p class="level">Nivel ${levelName}</p>`;
    html += progressBar(0);

    lessons.forEach((sentence,i)=>{
        html+=`
        <div class="card">
            <p>Say:</p>
            <h4>${sentence}</h4>
            <button onclick="speak('${sentence}')">🔊 Escuchar</button>
            <button onclick="listenAndCheck('${sentence}','a${i}')">🎤 Responder</button>
            <p id="a${i}" class="result"></p>
        </div>
        `;
    });

    html+=`<button onclick="evaluateLevel()">📊 Evaluar Nivel</button>`;
    document.getElementById("adultContent").innerHTML=html;
}

//////////////////////////////////////////////////
// EVALUACIÓN
//////////////////////////////////////////////////

function evaluateLevel(){

    let percent = (correctAnswers/totalQuestions)*100;

    if(percent>=PASS_PERCENT){
        alert("✅ Aprobado con "+percent.toFixed(0)+"%");

        if(currentMode==="kids"){
            progress.kidsIndex++;
        }else{
            progress.adultIndex++;
        }

        saveProgress();
        selectMode(currentMode);

    }else{
        alert("❌ Necesitas mínimo 80%. Obtuviste "+percent.toFixed(0)+"%");
        selectMode(currentMode);
    }
}

//////////////////////////////////////////////////
// BARRA PROGRESO
//////////////////////////////////////////////////

function progressBar(percent){
    return `
    <div class="progressBar">
        <div class="progressFill" style="width:${percent}%"></div>
    </div>
    `;
}

</script>

</body>
</html>
