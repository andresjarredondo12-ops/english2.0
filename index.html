<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master A1-C2</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
}

.container{
    padding:15px;
    max-width:800px;
    margin:auto;
}

button{
    padding:8px 12px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}

button:hover{ background:#ffd700; }

.hidden{ display:none; }

.card{
    background:white;
    color:#333;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}

input{
    padding:8px;
    width:90%;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

.progressBar{
    width:100%;
    height:18px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}

.progressFill{
    height:100%;
    background:#4caf50;
    width:0%;
    transition:0.3s;
}

.word{
    display:inline-block;
    padding:6px 10px;
    margin:5px;
    background:#4facfe;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

.word.selected{
    background:#ffd700;
    color:black;
}

.level{ font-size:20px; font-weight:bold; }
.phase{ font-weight:bold; margin-bottom:10px; }

</style>
</head>
<body>

<div class="container">

<h1>🎓 English Master A1 → C2</h1>

<div id="home">
    <button onclick="selectMode('kids')">👶 Niños</button>
    <button onclick="selectMode('adult')">👨‍💼 Adultos</button>
</div>

<div id="kids" class="hidden">
    <div id="kidsContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

<div id="adult" class="hidden">
    <div id="adultContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

</div>

<script>

const levels=["A1","A2","B1","B2","C1","C2"];
const PASS_PERCENT=80;

let progress=JSON.parse(localStorage.getItem("progress"))||{
    kidsIndex:0,
    adultIndex:0
};

let correctAnswers=0;
let totalQuestions=0;
let currentMode="";
let currentPhase="audio";
let exerciseStates={};

function saveProgress(){
    localStorage.setItem("progress",JSON.stringify(progress));
}

/* VOZ */

function speak(text){
    let speech=new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speech.rate=0.9;
    speechSynthesis.speak(speech);
}

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

function listenAndCheck(correct,id){
    if(!SpeechRecognition){ alert("Usa Chrome"); return; }
    let recognition=new SpeechRecognition();
    recognition.lang="en-US";
    recognition.start();
    recognition.onresult=function(e){
        let user=e.results[0][0].transcript.toLowerCase().trim();
        verify(user,correct,id);
    };
}

/* VERIFICACIÓN */

function verify(user,correct,id){
    let el=document.getElementById(id);
    if(el.dataset.answered==="true") return;

    if(user.toLowerCase().trim()===correct.toLowerCase().trim()){
        el.innerHTML="✅ Correcto";
        el.style.color="green";
        correctAnswers++;
    }else{
        el.innerHTML="❌ Incorrecto<br>✔ "+correct;
        el.style.color="red";
    }

    el.dataset.answered="true";
    updateBar();
}

function updateBar(){
    let percent=(correctAnswers/totalQuestions)*100;
    let bar=document.querySelector(".progressFill");
    if(bar) bar.style.width=percent+"%";
}

/* CONTENIDO */

const content={
kids:{
A1:{audio:["Hello","Good morning"],grammar:["I am happy","This is my dog"]},
A2:{audio:["Where is my book?"],grammar:["I am going to school"]},
B1:{audio:["What are you doing?"],grammar:["I am studying because I have a test"]},
B2:{audio:["Can you help me?"],grammar:["If I study, I will pass the exam"]},
C1:{audio:["What would you like to be?"],grammar:["If I had more time, I would learn English"]},
C2:{audio:["Communication is important"],grammar:["Although it was difficult, I finished the project successfully"]}
},
adult:{
A1:{audio:["Hello, how are you?"],grammar:["I work every day"]},
A2:{audio:["How much does this cost?"],grammar:["I am learning English to improve my career"]},
B1:{audio:["I am looking for a job"],grammar:["If I have time, I will call you"]},
B2:{audio:["Let's schedule a meeting"],grammar:["We achieved our goals because we worked hard"]},
C1:{audio:["The market has changed"],grammar:["If we invest more, we will increase profits"]},
C2:{audio:["Globalization affects markets"],grammar:["Strategic planning determines long term success"]}
}
};

/* NAVEGACIÓN */

function selectMode(mode){
    currentMode=mode;
    currentPhase="audio";
    document.getElementById("home").classList.add("hidden");
    document.getElementById(mode).classList.remove("hidden");
    loadContent();
}

function goHome(){
    document.getElementById("kids").classList.add("hidden");
    document.getElementById("adult").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

/* CARGA */

function loadContent(){

    exerciseStates={};
    correctAnswers=0;

    let index=currentMode==="kids"?progress.kidsIndex:progress.adultIndex;

    if(index>=levels.length){
        document.getElementById(currentMode+"Content").innerHTML="<h2>🏆 Curso completado</h2>";
        return;
    }

    let level=levels[index];
    let lessons=content[currentMode][level][currentPhase];

    totalQuestions=currentPhase==="audio"
        ? lessons.length
        : lessons.length*2;

    let html=`<p class="level">Nivel ${level}</p>`;
    html+=`<p class="phase">Fase: ${currentPhase.toUpperCase()}</p>`;
    html+=progressBar(0);

    lessons.forEach((text,i)=>{

        if(currentPhase==="audio"){

            html+=`
            <div class="card">
            <button onclick="speak('${text}')">🔊 Escuchar</button>
            <button onclick="listenAndCheck('${text}','r${i}')">🎤 Pronunciar</button>
            <p id="r${i}"></p>
            </div>`;

        }else{

            html+=`
            <div class="card">
            <p><strong>Escribe:</strong></p>
            <input type="text" id="w${i}">
            <button onclick="verify(document.getElementById('w${i}').value,'${text}','t${i}')">Verificar</button>
            <p id="t${i}"></p>
            <hr>
            <p><strong>Ordena la frase:</strong></p>
            <div id="words${i}"></div>
            <p id="order${i}"></p>
            <button onclick="checkOrder('${text}',${i})">Comprobar Orden</button>
            </div>`;
        }
    });

    html+=`<button onclick="evaluate()">Finalizar Fase</button>`;
    document.getElementById(currentMode+"Content").innerHTML=html;

    if(currentPhase==="grammar"){
        lessons.forEach((text,i)=>{
            createWordGame(text,i);
        });
    }
}

/* JUEGO ORDENAR */

function createWordGame(sentence,index){

    let words=sentence.split(" ").sort(()=>Math.random()-0.5);

    exerciseStates[index]={
        correct:sentence,
        selected:[],
        answered:false
    };

    let container=document.getElementById("words"+index);
    container.innerHTML="";

    words.forEach(word=>{

        let span=document.createElement("span");
        span.className="word";
        span.innerText=word;

        span.onclick=function(){

            if(exerciseStates[index].answered) return;

            exerciseStates[index].selected.push(word);
            span.classList.add("selected");

            document.getElementById("order"+index)
                .innerText=exerciseStates[index].selected.join(" ");
        };

        container.appendChild(span);
    });
}

function checkOrder(correct,index){

    let state=exerciseStates[index];
    if(state.answered) return;

    let user=state.selected.join(" ");

    if(user===correct){
        document.getElementById("order"+index).innerHTML="✅ Orden correcto";
        correctAnswers++;
    }else{
        document.getElementById("order"+index).innerHTML="❌ Incorrecto<br>✔ "+correct;
    }

    state.answered=true;
    updateBar();
}

/* EVALUACIÓN */

function evaluate(){

    let percent=(correctAnswers/totalQuestions)*100;

    if(percent>=PASS_PERCENT){

        if(currentPhase==="audio"){
            currentPhase="grammar";
        }else{

            if(currentMode==="kids") progress.kidsIndex++;
            else progress.adultIndex++;

            saveProgress();
            currentPhase="audio";
        }

        loadContent();

    }else{
        alert("Necesitas 80%. Obtuviste "+percent.toFixed(0)+"%");
        loadContent();
    }
}

function progressBar(percent){
    return `<div class="progressBar">
            <div class="progressFill" style="width:${percent}%"></div>
            </div>`;
}

</script>
</body>
</html>
