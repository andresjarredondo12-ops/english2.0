<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Master A1-C2</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    color:white;
    text-align:center;
}
.container{
    padding:15px;
    max-width:800px;
    margin:auto;
}
button{
    padding:8px 12px;
    margin:5px;
    border:none;
    border-radius:10px;
    font-size:14px;
    cursor:pointer;
    background:white;
    font-weight:bold;
}
button:hover{ background:#ffd700; }
.hidden{ display:none; }
.card{
    background:white;
    color:#333;
    padding:15px;
    border-radius:15px;
    margin:10px 0;
}
.progressBar{
    width:100%;
    height:18px;
    background:#ddd;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
}
.progressFill{
    height:100%;
    background:#4caf50;
    width:0%;
    transition:0.3s;
}
.level{ font-size:20px; font-weight:bold; }
.phase{ font-weight:bold; margin-bottom:10px; }
</style>
</head>
<body>

<div class="container">

<h1>🎓 English Master A1 → C2</h1>

<div id="home">
    <button onclick="selectMode('kids')">👶 Niños</button>
    <button onclick="selectMode('adult')">👨‍💼 Adultos</button>
</div>

<div id="kids" class="hidden">
    <div id="kidsContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

<div id="adult" class="hidden">
    <div id="adultContent"></div>
    <button onclick="goHome()">Volver</button>
</div>

</div>

<script>

const levels=["A1","A2","B1","B2","C1","C2"];
const PASS_PERCENT=80;

let progress=JSON.parse(localStorage.getItem("progress"))||{
    kidsIndex:0,
    adultIndex:0
};

let correctAnswers=0;
let totalQuestions=0;
let currentMode="";
let currentPhase="audio";
let currentQuestionIndex=0;

function saveProgress(){
    localStorage.setItem("progress",JSON.stringify(progress));
}

/* VOZ */

function speak(text){
    let speech=new SpeechSynthesisUtterance(text);
    speech.lang="en-US";
    speech.rate=0.9;
    speechSynthesis.speak(speech);
}

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

function startPronunciation(text){
    if(!SpeechRecognition){
        alert("Usa Chrome");
        return;
    }

    let recognition=new SpeechRecognition();
    recognition.lang="en-US";
    recognition.start();

    recognition.onresult=function(e){
        let user=e.results[0][0].transcript.toLowerCase().trim();
        checkPronunciation(user,text);
    };
}

function checkPronunciation(user,correct){

    let result=document.getElementById("result");

    if(user===correct.toLowerCase()){
        result.innerHTML="✅ Correcto";
        result.style.color="green";
        correctAnswers++;
    }else{
        result.innerHTML="❌ Incorrecto<br>✔ "+correct;
        result.style.color="red";
    }

    updateBar();

    setTimeout(()=>{
        currentQuestionIndex++;
        loadAudioQuestion();
    },1500);
}

/* CONTENIDO */

const content={
kids:{
A1:{audio:["Hello","Good morning"]},
A2:{audio:["Where is my book?"]},
B1:{audio:["What are you doing?"]},
B2:{audio:["Can you help me?"]},
C1:{audio:["What would you like to be?"]},
C2:{audio:["Communication is important"]}
},
adult:{
A1:{audio:["Hello, how are you?"]},
A2:{audio:["How much does this cost?"]},
B1:{audio:["I am looking for a job"]},
B2:{audio:["Let's schedule a meeting"]},
C1:{audio:["The market has changed"]},
C2:{audio:["Globalization affects markets"]}
}
};

/* NAVEGACIÓN */

function selectMode(mode){
    currentMode=mode;
    currentPhase="audio";
    currentQuestionIndex=0;
    correctAnswers=0;
    document.getElementById("home").classList.add("hidden");
    document.getElementById(mode).classList.remove("hidden");
    loadAudioQuestion();
}

function goHome(){
    document.getElementById("kids").classList.add("hidden");
    document.getElementById("adult").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}

/* CARGA AUDIO AUTOMÁTICO */

function loadAudioQuestion(){

    let index=currentMode==="kids"?progress.kidsIndex:progress.adultIndex;

    if(index>=levels.length){
        document.getElementById(currentMode+"Content").innerHTML="<h2>🏆 Curso completado</h2>";
        return;
    }

    let level=levels[index];
    let lessons=content[currentMode][level].audio;

    totalQuestions=lessons.length;

    if(currentQuestionIndex>=lessons.length){
        evaluate();
        return;
    }

    let text=lessons[currentQuestionIndex];

    let html=`
    <p class="level">Nivel ${level}</p>
    <p class="phase">Fase: AUDIO</p>
    ${progressBar()}
    <div class="card">
        <h2>${text}</h2>
        <button onclick="speak('${text}')">🔊 Escuchar</button>
        <button onclick="startPronunciation('${text}')">🎤 Pronunciar</button>
        <p id="result"></p>
    </div>
    `;

    document.getElementById(currentMode+"Content").innerHTML=html;
}

function evaluate(){

    let percent=(correctAnswers/totalQuestions)*100;

    if(percent>=PASS_PERCENT){
        if(currentMode==="kids") progress.kidsIndex++;
        else progress.adultIndex++;

        saveProgress();
        currentQuestionIndex=0;
        correctAnswers=0;
        loadAudioQuestion();
    }else{
        alert("Necesitas 80%. Obtuviste "+percent.toFixed(0)+"%");
        currentQuestionIndex=0;
        correctAnswers=0;
        loadAudioQuestion();
    }
}

function progressBar(){
    let percent=(correctAnswers/totalQuestions)*100;
    return `<div class="progressBar">
            <div class="progressFill" style="width:${percent}%"></div>
            </div>`;
}

function updateBar(){
    let percent=(correctAnswers/totalQuestions)*100;
    document.querySelector(".progressFill").style.width=percent+"%";
}

</script>
</body>
</html>
